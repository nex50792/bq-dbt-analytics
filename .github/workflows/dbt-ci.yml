name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dbt-bigquery
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify dbt installation
        run: dbt --version

      # Full dbt build/test in CI requires Workload Identity Federation
      # (docs/design-decisions.md セクション 8 参照)。
      # 現状は install 確認のみ、実 build/test は開発者ローカルで実施する。

  pages-deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: install-check
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
